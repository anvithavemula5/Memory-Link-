<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareConnect</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Lora:ital,wght@0,500;0,700;1,500&display=swap');
        
        :root {
            --bg: #FAF7F2; --card: #FFFFFF; --border: #EDE8DF;
            --amber: #E8A020; --blue: #4A78A8; --txt: #1E1A14;
            --shadow: 0 4px 18px rgba(0,0,0,.09);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--txt); }
        
        .app-container { max-width: 500px; margin: 0 auto; min-height: 100vh; background: var(--bg); }
        
        /* Screens */
        .login-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .login-logo { width: 80px; height: 80px; background: var(--amber); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 40px; margin-bottom: 20px; }
        
        /* Components */
        .who-cards { display: flex; gap: 15px; width: 100%; }
        .who-card { flex: 1; padding: 20px; background: white; border-radius: 20px; text-align: center; cursor: pointer; border: 2px solid var(--border); transition: 0.2s; }
        .who-card:hover { border-color: var(--amber); transform: translateY(-3px); }

        .header { padding: 30px 20px; background: white; border-bottom: 1px solid var(--border); }
        .section-card { background: white; margin: 15px; padding: 20px; border-radius: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .feature-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .feature-item { background: white; padding: 20px; border-radius: 20px; text-align: center; border: 1px solid var(--border); cursor: pointer; }
        
        .back-btn { background: none; border: none; color: var(--amber); font-weight: 800; cursor: pointer; margin-bottom: 10px; }
        .routine-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; padding: 10px; background: #FDFBFA; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" src="script.js"></script>
</body>
</html>
