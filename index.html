<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Care App</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Your Design System & CSS */
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Lora:ital,wght@0,500;0,700;1,500&display=swap');
        
        :root {
            --bg: #FAF7F2; --card: #FFFFFF; --border: #EDE8DF; --border2: #DDD7CB;
            --amber: #E8A020; --amber-lt: #FEF3DC; --amber-dk: #B87818; --amber-bg: #FFFBF2;
            --blue: #4A78A8; --blue-lt: #E0EAF5; --blue-dk: #2C5480; --blue-bg: #F2F6FB;
            --txt: #1E1A14; --txt-mid: #5A4E3A; --txt-soft: #9A8E7C;
            --green: #4A9060; --green-lt: #E4F2EB; --red: #C84040; --red-lt: #FAEAEA;
            --shadow-sm: 0 2px 8px rgba(0,0,0,.07); --shadow: 0 4px 18px rgba(0,0,0,.09); --shadow-lg: 0 10px 40px rgba(0,0,0,.13);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--txt); min-height: 100vh; }
        
        /* Inclusion of your specific login styles */
        .login-screen {
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 32px 20px;
            background: linear-gradient(160deg,#FAF7F2 0%,#F5EFE2 50%,#EEF2F8 100%);
            position: relative; overflow: hidden;
        }
        .login-brand { text-align: center; margin-bottom: 40px; z-index: 1; }
        .login-logo {
            width: 84px; height: 84px; background: linear-gradient(145deg,var(--amber),#F0C060);
            border-radius: 26px; display: flex; align-items: center; justify-content: center;
            font-size: 40px; margin: 0 auto 18px; border: 3px solid rgba(255,255,255,.7);
        }
        .login-title { font-family: 'Lora', serif; font-size: 34px; color: var(--txt); }
        
        .who-cards { display: flex; gap: 12px; z-index: 1; width: 100%; max-width: 440px; }
        .who-card {
            flex: 1; padding: 24px 16px; border-radius: 20px; border: 2px solid var(--border);
            background: var(--card); cursor: pointer; text-align: center; transition: all .22s;
        }
        .who-card:hover { transform: translateY(-3px); border-color: var(--amber); }
        .who-icon { font-size: 42px; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        function App() {
            const [view, setView] = useState('login');

            return (
                <div className="app">
                    {view === 'login' && (
                        <div className="login-screen">
                            <div className="login-brand">
                                <div className="login-logo">☀️</div>
                                <h1 className="login-title">CareConnect</h1>
                                <p className="login-tagline">Warmth, clarity, and trust.</p>
                            </div>

                            <div className="who-cards">
                                <div className="who-card" onClick={() => alert('Patient login clicked')}>
                                    <span className="who-icon">👤</span>
                                    <div className="who-name">Patient</div>
                                    <div className="who-desc">Access your care</div>
                                </div>
                                <div className="who-card" onClick={() => alert('Family login clicked')}>
                                    <span className="who-icon">🏠</span>
                                    <div className="who-name">Family</div>
                                    <div className="who-desc">View updates</div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
